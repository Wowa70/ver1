  <!DOCTYPE html>
  <html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RTA Simple Pro v4.1</title>
    <style>
      :root {
        --bg: #0a0c10; --panel: #161b22; --accent: #ff7a18; --txt: #d8e1ec; --mut: #6f7d8f;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0; background: var(--bg); color: var(--txt);
        font-family: ui-monospace, monospace; overflow: hidden;
        display: flex; flex-direction: column; height: 100vh;
        /* Учет вырезов на смартфонах (челки) */
        padding-top: env(safe-area-inset-top);
      }
      header {
        padding: 10px 15px; background: var(--panel); border-bottom: 1px solid #30363d;
        display: flex; justify-content: space-between; align-items: center;
        z-index: 10;
      }
      .controls {
        display: flex; gap: 8px; padding: 10px; background: var(--panel);
        flex-wrap: wrap; justify-content: center; border-bottom: 1px solid #30363d;
        z-index: 10;
      }
      button {
        background: #21262d; color: var(--txt); border: 1px solid #30363d;
        padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
      }
      button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

      main {
        flex: 1; position: relative;
        /* Оставляем место снизу для панелей браузера */
        margin-bottom: env(safe-area-inset-bottom);
      }
      canvas { width: 100%; height: 100%; display: block; }

      /* Цифровой индикатор ПИКА прямо на экране */
      #peak-display {
        position: absolute; top: 15px; right: 15px;
        background: rgba(0, 0, 0, 0.6);
        color: var(--accent);
        padding: 5px 10px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        border: 1px solid var(--accent);
        pointer-events: none;
        z-index: 20;
      }
      #status { font-size: 10px; color: var(--mut); }
    </style>
  </head>
  <body>

  <header>
    <div style="font-weight: bold; letter-spacing: 1px;">RTA SIMPLE <span id="status">OFFLINE</span></div>
    <button id="startBtn" style="background: var(--accent); color: #000; font-weight: bold;">START</button>
  </header>

  <div class="controls">
    <button id="btn-none" class="active">Без шума</button>
    <button id="btn-white">Белый шум</button>
    <button id="btn-pink">Розовый шум</button>
    <select id="fftSize" style="background:#21262d; color:white; border:1px solid #30363d; border-radius:6px; font-size:12px;">
      <option value="2048">2048</option>
      <option value="4096" selected>4096</option>
      <option value="8192">8192</option>
    </select>
  </div>

  <main>
    <!-- Индикатор уровня -->
    <div id="peak-display">RMS: -∞ dB</div>
    <canvas id="canvas"></canvas>
  </main>

  <script>
    let audioCtx, analyser, microphone, noiseNode, currentNoise = 'none';
    let dataArray;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const statusLabel = document.getElementById('status');
    const peakDisplay = document.getElementById('peak-display');

    async function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = parseInt(document.getElementById('fftSize').value);
      analyser.smoothingTimeConstant = 0.8;
      dataArray = new Uint8Array(analyser.frequencyBinCount);

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        microphone = audioCtx.createMediaStreamSource(stream);
        microphone.connect(analyser);

        statusLabel.textContent = 'LIVE';
        statusLabel.style.color = '#4ade80';
        startBtn.textContent = 'STOP';
        render();
      } catch (e) {
        alert("Ошибка доступа к микрофону: " + e.message);
      }
    }

    function setNoise(type) {
      if (!audioCtx) return;
      if (noiseNode) { noiseNode.stop(); noiseNode = null; }
      currentNoise = type;
      if (type === 'none') return;

      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      if (type === 'white') {
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      } else if (type === 'pink') {
        let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
        for (let i = 0; i < bufferSize; i++) {
          let white = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + white * 0.0555179;
          b1 = 0.99332 * b1 + white * 0.0751511;
          b2 = 0.9632 * b2 + white * 0.15137;
          b3 = 0.8665 * b3 + white * 0.310485;
          b4 = 0.5500 * b4 + white * 0.530329;
          b5 = 0.075 * b5 + white * 0.133164;
          b6 = 0.005 * b6 + white * 0.01035;
          data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6) * 0.11;
        }
      }
      noiseNode = audioCtx.createBufferSource();
      noiseNode.buffer = buffer;
      noiseNode.loop = true;
      noiseNode.connect(audioCtx.destination);
      noiseNode.start();
    }

    function getLogX(freq, width) {
      return (Math.log10(freq) - Math.log10(20)) / (Math.log10(20000) - Math.log10(20)) * width;
    }

    function render() {
      requestAnimationFrame(render);
      analyser.getByteFrequencyData(dataArray);

      const w = canvas.width = canvas.clientWidth;
      const h = canvas.height = canvas.clientHeight;

      ctx.fillStyle = '#0a0c10';
      ctx.fillRect(0, 0, w, h);

      // Сетка
      ctx.strokeStyle = '#1f2a36';
      ctx.fillStyle = '#6f7d8f';
      ctx.font = '10px monospace';
      [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000].forEach(f => {
        const x = getLogX(f, w);
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        ctx.fillText(f >= 1000 ? (f/1000)+'k' : f, x + 2, h - 5);
      });

      // Отрисовка спектра + поиск пика
      ctx.beginPath();
      ctx.strokeStyle = '#ff7a18';
      ctx.lineWidth = 2;

      let maxVal = 0;
      let maxBin = 0;
      let sum = 0;

      const binWidth = (audioCtx.sampleRate / 2) / analyser.frequencyBinCount;
      for (let i = 0; i < dataArray.length; i++) {
        const val = dataArray[i];
        sum += val;
        if (val > maxVal) { maxVal = val; maxBin = i; }

        const freq = i * binWidth;
        if (freq < 20) continue;
        if (freq > 20000) break;
        const x = getLogX(freq, w);
        const y = h - (val / 255 * h);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // 1. Рисуем маркер самого громкого пика прямо на графике
      const peakFreq = maxBin * binWidth;
      if (peakFreq >= 20 && peakFreq <= 20000) {
        const px = getLogX(peakFreq, w);
        const py = h - (maxVal / 255 * h);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fill();
        // Подпись частоты пика
        ctx.font = '10px monospace';
        ctx.fillText(Math.round(peakFreq) + 'Hz', px - 15, py - 10);
      }

      // 2. Обновляем цифровой индикатор RMS вверху
      let avg = sum / dataArray.length;
      let db = 20 * Math.log10(avg / 255);
      peakDisplay.textContent = `RMS: ${db === -Infinity ? '-∞' : db.toFixed(1)} dB`;
    }

    startBtn.onclick = () => {
      if (!audioCtx) {
        initAudio();
      } else {
        location.reload();
      }
    };

    document.getElementById('btn-none').onclick = (e) => { setNoise('none'); updateBtn(e.target); };
    document.getElementById('btn-white').onclick = (e) => { setNoise('white'); updateBtn(e.target); };
    document.getElementById('btn-pink').onclick = (e) => { setNoise('pink'); updateBtn(e.target); };

    function updateBtn(activeBtn) {
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      activeBtn.classList.add('active');
    }
  </script>
  </body>
  </html>
